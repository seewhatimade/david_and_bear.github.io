function drawGrassBackground() {
  ctx.fillStyle = '#6abf4b';
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);
  // Lighter grass tufts
  ctx.fillStyle = '#7ccf5a';
  for (let i = 0; i < 180; i++) {
    const gx = (i * 97) % WORLD_W;
    const gy = (i * 173) % WORLD_H;
    ctx.beginPath();
    ctx.ellipse(gx, gy, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Small flowers
  const flowerColors = ['#ffd1e8', '#fff1a8', '#c7e8ff'];
  for (let i = 0; i < 40; i++) {
    const fx = ((i * 211) % WORLD_W);
    const fy = ((i * 331) % WORLD_H);
    ctx.fillStyle = flowerColors[i % flowerColors.length];
    ctx.beginPath(); ctx.arc(fx, fy, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff89a';
    ctx.beginPath(); ctx.arc(fx, fy, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawRoads() {
  for (const r of roads) {
    ctx.fillStyle = '#a89d8a';
    ctx.fillRect(r.x, r.y, r.w, r.h);
    // lighter border strips
    ctx.fillStyle = '#8c8272';
    ctx.fillRect(r.x, r.y, r.w, 6);
    ctx.fillRect(r.x, r.y + r.h - 6, r.w, 6);
    // dashed centre line
    ctx.fillStyle = '#fff5c2';
    if (r.horizontal) {
      const cy = r.y + r.h / 2 - 3;
      for (let x = r.x + 20; x < r.x + r.w - 20; x += 50) {
        ctx.fillRect(x, cy, 26, 6);
      }
    } else {
      const cx = r.x + r.w / 2 - 3;
      for (let y = r.y + 20; y < r.y + r.h - 20; y += 50) {
        ctx.fillRect(cx, y, 6, 26);
      }
    }
  }
}

function drawHouse(h, isHome) {
  // body
  ctx.fillStyle = isHome ? '#fff0d6' : '#f8f0e2';
  ctx.fillRect(h.x, h.y, h.w, h.h);
  // outline
  ctx.strokeStyle = '#3a2a1a';
  ctx.lineWidth = 4;
  ctx.strokeRect(h.x, h.y, h.w, h.h);
  // roof
  ctx.fillStyle = isHome ? '#5fb85f' : (h.color || '#c85b47');
  ctx.beginPath();
  ctx.moveTo(h.x - 10, h.y);
  ctx.lineTo(h.x + h.w / 2, h.y - 50);
  ctx.lineTo(h.x + h.w + 10, h.y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#3a2a1a';
  ctx.lineWidth = 3;
  ctx.stroke();
  // door
  const doorW = 38, doorH = 58;
  const dx = h.x + h.w / 2 - doorW / 2;
  const dy = h.y + h.h - doorH;
  ctx.fillStyle = '#5e3a1a';
  ctx.fillRect(dx, dy, doorW, doorH);
  ctx.strokeStyle = '#3a2a1a';
  ctx.strokeRect(dx, dy, doorW, doorH);
  ctx.fillStyle = '#e8c964';
  ctx.beginPath(); ctx.arc(dx + doorW - 7, dy + doorH / 2, 2.5, 0, Math.PI * 2); ctx.fill();
  // window
  const wsize = 30;
  ctx.fillStyle = '#a8dcff';
  ctx.fillRect(h.x + 18, h.y + 22, wsize, wsize);
  ctx.fillRect(h.x + h.w - 18 - wsize, h.y + 22, wsize, wsize);
  ctx.strokeStyle = '#3a2a1a';
  ctx.strokeRect(h.x + 18, h.y + 22, wsize, wsize);
  ctx.strokeRect(h.x + h.w - 18 - wsize, h.y + 22, wsize, wsize);
  ctx.beginPath();
  ctx.moveTo(h.x + 18 + wsize / 2, h.y + 22); ctx.lineTo(h.x + 18 + wsize / 2, h.y + 22 + wsize);
  ctx.moveTo(h.x + 18, h.y + 22 + wsize / 2); ctx.lineTo(h.x + 18 + wsize, h.y + 22 + wsize / 2);
  ctx.moveTo(h.x + h.w - 18 - wsize / 2, h.y + 22); ctx.lineTo(h.x + h.w - 18 - wsize / 2, h.y + 22 + wsize);
  ctx.moveTo(h.x + h.w - 18 - wsize, h.y + 22 + wsize / 2); ctx.lineTo(h.x + h.w - 18, h.y + 22 + wsize / 2);
  ctx.stroke();
  if (isHome) {
    // "HOME" sign above door
    ctx.fillStyle = '#3a2a1a';
    ctx.font = 'bold 22px "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.fillText('HOME', h.x + h.w / 2, dy - 8);
    // heart on door
    ctx.fillStyle = '#ff6a6a';
    const hx = dx + doorW / 2, hy = dy + 18;
    ctx.beginPath();
    ctx.arc(hx - 4, hy, 4, 0, Math.PI * 2);
    ctx.arc(hx + 4, hy, 4, 0, Math.PI * 2);
    ctx.moveTo(hx - 8, hy + 1);
    ctx.lineTo(hx, hy + 10);
    ctx.lineTo(hx + 8, hy + 1);
    ctx.closePath();
    ctx.fill();
  }
}

function drawBush(b) {
  const wob = Math.sin(b.wobble) * 2;
  ctx.fillStyle = '#2f7a36';
  ctx.beginPath();
  ctx.ellipse(b.x, b.y + b.r * 0.6, b.r + 3, b.r * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  // multi-lobed bush
  const lobes = [
    { dx: -b.r * 0.5, dy: 0, r: b.r * 0.75 },
    { dx: b.r * 0.5,  dy: 0, r: b.r * 0.75 },
    { dx: 0, dy: -b.r * 0.35, r: b.r * 0.9 },
    { dx: -b.r * 0.2, dy: b.r * 0.2, r: b.r * 0.65 },
    { dx: b.r * 0.2, dy: b.r * 0.2, r: b.r * 0.65 },
  ];
  ctx.fillStyle = '#3fa04a';
  for (const l of lobes) {
    ctx.beginPath();
    ctx.arc(b.x + l.dx, b.y + l.dy + wob, l.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#55bf60';
  for (const l of lobes) {
    ctx.beginPath();
    ctx.arc(b.x + l.dx - l.r * 0.3, b.y + l.dy - l.r * 0.3 + wob, l.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
  // tiny berries
  ctx.fillStyle = '#ff5a5a';
  const seed = Math.floor(b.x + b.y);
  for (let i = 0; i < 4; i++) {
    const a = (seed + i * 73) % 360 * Math.PI / 180;
    const rr = b.r * 0.55;
    ctx.beginPath();
    ctx.arc(b.x + Math.cos(a) * rr, b.y + Math.sin(a) * rr * 0.8 + wob, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBushHint(b, rustleScale) {
  // When bear is hidden here, show a tiny ear peeking out sometimes.
  const t = bear.rustlePhase;
  const peek = (Math.sin(t) + 1) / 2; // 0..1
  if (peek > 0.7) {
    // a tiny brown ear on top of the bush
    ctx.fillStyle = '#8a5a2a';
    ctx.beginPath();
    ctx.arc(b.x - 6, b.y - b.r * 0.55, 5, 0, Math.PI * 2);
    ctx.arc(b.x + 6, b.y - b.r * 0.55, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f2c39a';
    ctx.beginPath();
    ctx.arc(b.x - 6, b.y - b.r * 0.55, 2, 0, Math.PI * 2);
    ctx.arc(b.x + 6, b.y - b.r * 0.55, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBear(cx, cy, size = 1, asCarry = false) {
  const s = size;
  // body
  ctx.fillStyle = '#8a5a2a';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 6 * s, 14 * s, 12 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  // head
  ctx.beginPath();
  ctx.arc(cx, cy - 6 * s, 12 * s, 0, Math.PI * 2);
  ctx.fill();
  // ears
  ctx.beginPath();
  ctx.arc(cx - 9 * s, cy - 14 * s, 5 * s, 0, Math.PI * 2);
  ctx.arc(cx + 9 * s, cy - 14 * s, 5 * s, 0, Math.PI * 2);
  ctx.fill();
  // muzzle
  ctx.fillStyle = '#f2d0a8';
  ctx.beginPath();
  ctx.ellipse(cx, cy - 3 * s, 6 * s, 4 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  // inner ears
  ctx.fillStyle = '#f2c39a';
  ctx.beginPath();
  ctx.arc(cx - 9 * s, cy - 14 * s, 2 * s, 0, Math.PI * 2);
  ctx.arc(cx + 9 * s, cy - 14 * s, 2 * s, 0, Math.PI * 2);
  ctx.fill();
  // eyes
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(cx - 4 * s, cy - 7 * s, 1.8 * s, 0, Math.PI * 2);
  ctx.arc(cx + 4 * s, cy - 7 * s, 1.8 * s, 0, Math.PI * 2);
  ctx.fill();
  // nose
  ctx.beginPath();
  ctx.arc(cx, cy - 4 * s, 1.6 * s, 0, Math.PI * 2);
  ctx.fill();
  // smile
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1 * s;
  ctx.beginPath();
  ctx.arc(cx, cy - 2 * s, 2 * s, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();
}

function drawDavid() {
  const x = david.x, y = david.y;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(x, y + 22, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  const walk = Math.sin(david.walkPhase) * 4;
  const walk2 = -walk;

  // legs
  ctx.fillStyle = '#2a4a8a';
  ctx.fillRect(x - 9, y + 8, 7, 14 + walk);
  ctx.fillRect(x + 2, y + 8, 7, 14 + walk2);
  // shoes
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(x - 10, y + 22 + walk, 9, 4);
  ctx.fillRect(x + 1, y + 22 + walk2, 9, 4);

  // body (shirt)
  ctx.fillStyle = '#e53b3b';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(x - 12, y - 8, 24, 20, 4) : ctx.rect(x - 12, y - 8, 24, 20);
  ctx.fill();
  // collar stripe
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 12, y - 8, 24, 3);

  // arms
  ctx.fillStyle = '#f2c39a';
  if (bear.state === 'carried') {
    // both arms forward, cradling bear
    ctx.fillRect(x - 16, y - 2, 5, 14);
    ctx.fillRect(x + 11, y - 2, 5, 14);
  } else {
    ctx.fillRect(x - 15, y - 4, 5, 14 - walk);
    ctx.fillRect(x + 10, y - 4, 5, 14 + walk);
  }

  // head
  ctx.fillStyle = '#f2c39a';
  ctx.beginPath();
  ctx.arc(x, y - 18, 12, 0, Math.PI * 2);
  ctx.fill();
  // hair
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.arc(x, y - 22, 12, Math.PI, 2 * Math.PI);
  ctx.fill();
  ctx.fillRect(x - 12, y - 24, 24, 6);

  // eyes — based on facing
  ctx.fillStyle = '#1a1a1a';
  if (david.facing === 'left') {
    ctx.beginPath(); ctx.arc(x - 6, y - 18, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x - 1, y - 18, 1.8, 0, Math.PI * 2); ctx.fill();
  } else if (david.facing === 'right') {
    ctx.beginPath(); ctx.arc(x + 1, y - 18, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 6, y - 18, 1.8, 0, Math.PI * 2); ctx.fill();
  } else if (david.facing === 'up') {
    // facing away — show hair more
    ctx.fillStyle = '#3a2a1a';
    ctx.beginPath(); ctx.arc(x, y - 18, 11, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(x - 4, y - 18, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 4, y - 18, 2, 0, Math.PI * 2); ctx.fill();
    // mouth (little smile)
    ctx.strokeStyle = '#8a3a3a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y - 14, 3, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  }

  // if carrying bear, draw it in arms
  if (bear.state === 'carried') {
    drawBear(x, y + 2, 0.85, true);
  }
}

function drawDino() {
  const x = dino.x, y = dino.y;
  const dir = dino.facing === 'right' ? 1 : (dino.facing === 'left' ? -1 : (dino.facing === 'down' ? 1 : -1));

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(x, y + 34, 36, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir, 1);

  const walk = Math.sin(dino.walkPhase) * 3;
  const walk2 = -walk;

  // tail
  ctx.fillStyle = '#3a8a3a';
  ctx.beginPath();
  ctx.moveTo(-18, 4);
  ctx.quadraticCurveTo(-50, -12, -58, 14);
  ctx.quadraticCurveTo(-48, 12, -18, 18);
  ctx.closePath();
  ctx.fill();

  // legs
  ctx.fillStyle = '#2a7a2a';
  ctx.fillRect(-10, 18, 10, 16 + walk);
  ctx.fillRect(6, 18, 10, 16 + walk2);
  // feet claws
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(-10, 32 + walk, 11, 4);
  ctx.fillRect(6, 32 + walk2, 11, 4);

  // body
  ctx.fillStyle = '#3fa03f';
  ctx.beginPath();
  ctx.ellipse(0, 4, 30, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  // belly
  ctx.fillStyle = '#b5e085';
  ctx.beginPath();
  ctx.ellipse(4, 12, 18, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // little arms
  ctx.fillStyle = '#3fa03f';
  ctx.fillRect(10, -2, 10, 4);
  ctx.fillRect(12, 2, 4, 6);

  // back spikes
  ctx.fillStyle = '#e8d84a';
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 7 - 2, -10);
    ctx.lineTo(i * 7 + 2, -10);
    ctx.lineTo(i * 7, -18);
    ctx.closePath();
    ctx.fill();
  }

  // head (in front)
  ctx.fillStyle = '#3fa03f';
  ctx.beginPath();
  ctx.ellipse(22, -8, 22, 16, 0, 0, Math.PI * 2);
  ctx.fill();
  // snout
  ctx.beginPath();
  ctx.ellipse(38, -4, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // teeth
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(32 + i * 4, 2);
    ctx.lineTo(34 + i * 4, 2);
    ctx.lineTo(33 + i * 4, 6);
    ctx.closePath();
    ctx.fill();
  }

  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(28, -12, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  const eyeShift = bear.state === 'carried' ? 2 : 0;
  ctx.beginPath(); ctx.arc(29 + eyeShift, -11, 2.5, 0, Math.PI * 2); ctx.fill();

  // angry brow when chasing
  if (bear.state === 'carried') {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(24, -18);
    ctx.lineTo(34, -15);
    ctx.stroke();
  }

  ctx.restore();
}

function drawPoop(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(p.scale, p.scale);
  // ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(0, 10, 15, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // stacked swirl
  ctx.fillStyle = '#5e3a1a';
  ctx.beginPath(); ctx.ellipse(0, 5, 13, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2, -2, 9, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2, -7, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -10, 2, 0, Math.PI * 2); ctx.fill();
  // highlights
  ctx.fillStyle = '#8a5a2a';
  ctx.beginPath(); ctx.ellipse(-5, 3, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-3, -3, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  // stink lines (only animate for first few seconds)
  if (p.age < 4) {
    const tm = performance.now() * 0.003;
    const alpha = Math.max(0, 1 - p.age / 4) * 0.55;
    ctx.strokeStyle = `rgba(150, 190, 110, ${alpha})`;
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 2; i++) {
      ctx.beginPath();
      const xo = (i * 6) - 3;
      const yo = -14 - Math.sin(tm + i) * 2;
      ctx.moveTo(xo, yo);
      ctx.quadraticCurveTo(xo + 3, yo - 4, xo, yo - 8);
      ctx.quadraticCurveTo(xo - 3, yo - 12, xo, yo - 16);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawOneParent(cx, cy, walkPhase, isMom) {
  const walk = Math.sin(walkPhase) * 3;
  const walk2 = -walk;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 28, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // legs
  ctx.fillStyle = isMom ? '#6a4aa0' : '#3a3a5a';
  ctx.fillRect(cx - 8, cy + 10, 7, 18 + walk);
  ctx.fillRect(cx + 1, cy + 10, 7, 18 + walk2);
  // shoes
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx - 9, cy + 28 + walk, 9, 4);
  ctx.fillRect(cx, cy + 28 + walk2, 9, 4);
  // body
  ctx.fillStyle = isMom ? '#e64b88' : '#3a7ac0';
  ctx.fillRect(cx - 12, cy - 10, 24, 22);
  // arms
  ctx.fillStyle = '#f2c39a';
  ctx.fillRect(cx - 16, cy - 6, 5, 16);
  ctx.fillRect(cx + 11, cy - 6, 5, 16);
  // head
  ctx.fillStyle = '#f2c39a';
  ctx.beginPath();
  ctx.arc(cx, cy - 20, 12, 0, Math.PI * 2);
  ctx.fill();
  // hair
  ctx.fillStyle = isMom ? '#b0603a' : '#2a1a10';
  if (isMom) {
    // longer hair
    ctx.beginPath(); ctx.arc(cx, cy - 22, 13, Math.PI, 2 * Math.PI); ctx.fill();
    ctx.fillRect(cx - 13, cy - 22, 26, 12);
  } else {
    ctx.beginPath(); ctx.arc(cx, cy - 24, 12, Math.PI, 2 * Math.PI); ctx.fill();
    ctx.fillRect(cx - 12, cy - 26, 24, 6);
  }
  // eyes + smile
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(cx - 4, cy - 20, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 4, cy - 20, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#8a3a3a';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy - 16, 3, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
}

function drawParents() {
  // Mom on the left, Dad on the right, a little offset.
  const off = 14;
  const drawPar = world === 'land' ? drawOneParent : world === 'ocean' ? drawOneParentScuba : drawOneParentAstronaut;
  drawPar(parents.x - off, parents.y, parents.walkPhase, true);
  drawPar(parents.x + off, parents.y, parents.walkPhase + Math.PI, false);
  // little speech bubble pulse
  const pulse = (Math.sin(performance.now() * 0.005) + 1) / 2;
  ctx.globalAlpha = 0.6 + pulse * 0.4;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(parents.x, parents.y - 50, 34, 16, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#333';
  ctx.font = 'bold 16px "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillText('David!', parents.x, parents.y - 45);
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawArrowToTarget() {
  // Show a small arrow on the edge of the world pointing toward the current objective
  // (the bear's bush while hidden, then home once carried). Only when target is far.
  let target;
  if (bear.state === 'hidden') {
    const b = bushes[bear.bushIdx];
    target = { x: b.x, y: b.y };
  } else if (bear.state === 'carried') {
    target = { x: home.x + home.w / 2, y: home.y + home.h / 2 };
  } else return;

  const dx = target.x - david.x, dy = target.y - david.y;
  const d = Math.hypot(dx, dy);
  if (d < 260) return;

  const ang = Math.atan2(dy, dx);
  const ax = david.x + Math.cos(ang) * 55;
  const ay = david.y + Math.sin(ang) * 55 - 28;
  ctx.save();
  ctx.translate(ax, ay);
  ctx.rotate(ang);
  ctx.fillStyle = bear.state === 'carried' ? '#5fb85f' : '#ffcf4a';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.lineTo(-4, -8);
  ctx.lineTo(-4, 8);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function draw() {
  const { scale, tx, ty } = getTransform();

  // Border background (outside world)
  ctx.fillStyle = world === 'space' ? '#050520' : world === 'ocean' ? '#1e5c90' : '#4a9ecf';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);

  if (world === 'land') drawGrassBackground();
  else if (world === 'ocean') drawOceanBackground();
  else drawSpaceBackground();
  if (world === 'land') drawRoads();

  // Draw entities z-ordered by base-y. Each call picks the right look for the current world.
  const drawables = [];
  const drawObstacle = (h, isHome) => {
    if (world === 'land') drawHouse(h, isHome);
    else if (world === 'ocean') drawRock(h, isHome);
    else drawAsteroid(h, isHome);
  };
  for (const h of houses) drawables.push({ y: h.y + h.h, draw: () => drawObstacle(h, false) });
  drawables.push({ y: home.y + home.h, draw: () => drawObstacle(home, true) });
  for (const b of bushes) {
    drawables.push({
      y: b.y + b.r * 0.6,
      draw: () => {
        if (world === 'land') {
          drawBush(b);
          if (b.hidesBear && bear.state === 'hidden') drawBushHint(b);
        } else if (world === 'ocean') {
          drawReef(b);
          if (b.hidesBear && bear.state === 'hidden') drawReefHint(b);
        } else {
          drawCrystal(b);
          if (b.hidesBear && bear.state === 'hidden') drawCrystalHint(b);
        }
      }
    });
  }
  drawables.push({ y: david.y + 22, draw: () => {
    if (world === 'land') drawDavid();
    else if (world === 'ocean') drawDavidScuba();
    else drawDavidAstronaut();
  } });
  drawables.push({ y: dino.y + 34, draw: () => {
    if (world === 'land') drawDino();
    else if (world === 'ocean') drawShark();
    else drawAlien();
  } });
  if (parents.active) drawables.push({ y: parents.y + 30, draw: drawParents });
  for (const p of poops) drawables.push({ y: p.y + 10, draw: () => drawPoop(p) });

  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.draw();

  drawParticles();
  if (gameState === 'playing' && transitionTimer <= 0) drawArrowToTarget();

  // Paused overlay (screen-space before world context is restored)
  if (paused && gameState === 'playing') {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);
    ctx.font = 'bold 96px "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 10;
    ctx.strokeStyle = '#1a1a1a';
    ctx.strokeText('Paused', WORLD_W / 2, WORLD_H / 2);
    ctx.fillStyle = '#fff';
    ctx.fillText('Paused', WORLD_W / 2, WORLD_H / 2);
    ctx.font = 'bold 32px "Comic Sans MS", cursive';
    ctx.lineWidth = 4;
    ctx.strokeText('Press P to resume', WORLD_W / 2, WORLD_H / 2 + 70);
    ctx.fillText('Press P to resume', WORLD_W / 2, WORLD_H / 2 + 70);
  }

  // Between-round celebration banner
  if (transitionTimer > 0 && transitionMessage) {
    const t = transitionTimer;
    const scalePop = 1 + Math.max(0, (2 - t)) * 0.15;
    ctx.save();
    ctx.translate(WORLD_W / 2, WORLD_H / 2 - 60);
    ctx.scale(scalePop, scalePop);
    ctx.font = 'bold 72px "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 8;
    ctx.strokeStyle = '#1a1a1a';
    ctx.strokeText(transitionMessage, 0, 0);
    ctx.fillStyle = '#ffe066';
    ctx.fillText(transitionMessage, 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

// ---------- Loop ----------
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  update(dt);
  draw();

  // Update HUD
  if (gameState === 'playing') {
    document.getElementById('hud-time').textContent = 'Time: ' + elapsed.toFixed(1) + 's';
    document.getElementById('hud-round').textContent = itemCapital() + ' #' + itemNumber();
    document.getElementById('hud-score').textContent = 'Score: ' + totalScore;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---------- State transitions / UI ----------
const bigMsg = document.getElementById('big-msg');
const msgTitle = document.getElementById('msg-title');
const msgBody = document.getElementById('msg-body');
const msgBtn = document.getElementById('msg-btn');

function showTitle() {
  gameState = 'title';
  msgTitle.textContent = 'David and the Lost Bear';
  msgBody.innerHTML = [
    'A baby bear is hiding in the bushes!',
    'Bring it home before the dinosaur eats it — then find another!',
    'After 5 bears, David dives into the ocean to rescue fish from a shark.',
    'After 5 fish, he blasts off to space to rescue robots from an alien!',
    'Mom and Dad will come fetch you if you take too long.',
    '',
    'Use the arrow keys or the buttons to move.',
    'Press P or the pause button any time.',
  ].map(l => l === '' ? '<span class="line gap"></span>' : `<span class="line">${l}</span>`).join('');
  msgBtn.textContent = 'Start!';
  bigMsg.classList.add('show');
  document.getElementById('hud-status').textContent = 'Find the bear!';
  document.getElementById('hud-time').textContent = 'Time: 0.0s';
  document.getElementById('hud-round').textContent = 'Bear #1';
  document.getElementById('hud-score').textContent = 'Score: 0';
}

function showEnd(title, body, btn) {
  msgTitle.textContent = title;
  msgBody.textContent = body;
  msgBtn.textContent = btn;
  bigMsg.classList.add('show');
}

function startGame() {
  resumeAudio();
  round = 1;
  totalScore = 0;
  world = 'land';
  pendingWorld = null;
  paused = false;
  const pb = document.getElementById('pause-btn');
  pb.innerHTML = '&#10074;&#10074;';
  pb.title = 'Pause (P)';
  startRound();
  gameState = 'playing';
  bigMsg.classList.remove('show');
}

msgBtn.addEventListener('click', startGame);
msgBtn.addEventListener('touchstart', e => { e.preventDefault(); startGame(); });

// Also let tapping the canvas on title screen start
canvas.addEventListener('mousedown', resumeAudio);
canvas.addEventListener('touchstart', resumeAudio, { passive: true });

// Kick it off
generateWorld();
showTitle();
</script>
</body>
